<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Guest Management System</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-dark">
  <div class="container-fluid">
    <a class="navbar-brand" href="/">Guest Management System</a>
    <div class="collapse navbar-collapse">
      <ul class="navbar-nav ms-auto">
        <li class="nav-item">
          <a class="nav-link active" href="/">Form Input</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" href="/laporan">Laporan Tamu</a>
        </li>
      </ul>
    </div>
  </div>
</nav>

<div class="container mt-4">
    <h4 class="mb-3 text-success">Form Input Tamu</h4>

    <!-- Dashboard Info -->
    <div class="row mb-3">
        <div class="col-md-6">
            <div class="card border-success">
                <div class="card-body py-2">
                    <h6 class="card-title mb-1">Jumlah Tamu Hari Ini</h6>
                    <p class="card-text mb-0 fw-bold">{{ jumlah_hari_ini }}</p>
                </div>
            </div>
        </div>
        <div class="col-md-6">
            <div class="card border-success">
                <div class="card-body py-2">
                    <h6 class="card-title mb-1">Sedang di Dalam</h6>
                    <p class="card-text mb-0 fw-bold">{{ sedang_di_dalam }}</p>
                </div>
            </div>
        </div>
    </div>

    <!-- Form Input -->
    <form method="POST" enctype="multipart/form-data" class="border p-3 bg-white rounded shadow-sm">
        <div class="mb-2">
            <label class="form-label">Nama</label>
            <input type="text" name="nama" class="form-control form-control-sm" required>
        </div>
        <div class="mb-2">
            <label class="form-label">NIK</label>
            <input type="text" name="nik" class="form-control form-control-sm" required>
        </div>
        <div class="mb-2">
            <label class="form-label">Tujuan</label>
            <input type="text" name="tujuan" class="form-control form-control-sm" required>
        </div>
        <div class="mb-2">
            <label class="form-label">User</label>
            <input type="text" name="user" class="form-control form-control-sm" required>
        </div>
        <div class="mb-2">
            <label class="form-label">Asal</label>
            <input type="text" name="asal" class="form-control form-control-sm" required>
        </div>
        <div class="mb-2">
            <label class="form-label">Foto Identitas</label>
            <input type="file" name="foto" class="form-control form-control-sm" accept="image/*" required>
        </div>
        <button type="submit" class="btn btn-success btn-sm">Simpan</button>
        <a href="/laporan" class="btn btn-outline-success btn-sm">Laporan</a>
    </form>
</div>

<!-- Footer -->
<footer class="text-white text-center">
    Guest Management System v1.0 © 2026 | Dibuat dengan Flask & Bootstrap
</footer>

</body>
</html>
